[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "common-python"
version = "1.0.0-dev"
description = "Common Python utilities"
requires-python = ">=3.9"
dependencies = [
    "loguru>=0.7.3",
    "elementpath>=4.7.0",
    "pytz>=2025.2",
    "tzlocal>=5.3.1",
    "aiohttp>=3.12.15",
    "boto3"
]

[project.urls]
Homepage = "https://github.com/brian-ruf/common-python"
Repository = "https://github.com/brian-ruf/common-python.git"
